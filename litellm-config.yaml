# LiteLLM — one config, any backend
# Default: local Ollama. Set env vars to use cloud providers.

model_list:
  # Embeddings — used for code vectorization (274MB, already installed)
  - model_name: embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

  # Chat/Synthesis — used for TL;DR, suggest_goals, best_question (1.9GB, already installed)
  - model_name: chat
    litellm_params:
      model: ollama/qwen2.5-coder:3b-instruct
      api_base: http://ollama:11434

