# TLDREADME — Default Stack
# Assumes Ollama is running locally (it probably is)
# Usage: docker compose up -d

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "16333:6333"
      - "16334:6334"
    volumes:
      - ./.tldr/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "16379:6379"
    volumes:
      - ./.tldr/falkordb:/data
    command: >
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --loadmodule /usr/lib/redis/modules/falkordb.so
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
